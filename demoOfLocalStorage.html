
<!DOCTYPE html>
<html>
<head>
    <title>localStorage Demo</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 500px;
        }
        input, button {
            padding: 8px;
            font-size: 16px;
            margin: 5px;
        }
        .item {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>localStorage Demo</h1>

<input type="text" id="nameInput" placeholder="Enter name">
<input type="text" id="rollInput" placeholder="Enter roll number">
<button onclick="addItem()">Add</button>

<h2>List:</h2>
<div id="list"></div>

<script>

// ===== CORE CONCEPT =====

// 1. SAVE DATA to localStorage
function saveToStorage(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
}

// 2. GET DATA from localStorage
function getFromStorage(key) {
    let data = localStorage.getItem(key);
    if (data) {
        return JSON.parse(data);
    }
    
    return [];
}

// 3. REMOVE DATA from localStorage
function removeFromStorage(key) {
    localStorage.removeItem(key);
}







// ===== APP LOGIC =====

let items = []; // Array to store items

// Load data when page opens
function loadData() {
    items = getFromStorage('myItems');
    displayItems();
}

// Add new item
function addItem() {
    let name = document.getElementById('nameInput').value;
    let roll = document.getElementById('rollInput').value;

    if (name == '' || roll == '') {
        alert('Fill both fields!');
        return;
    }

    // Add to array
    items.push({
        name: name,
        roll: roll,
        id: Date.now()
    });
    console.log(Date.now())

    // Save array to localStorage
    saveToStorage('myItems', items);

    // Clear inputs
    document.getElementById('nameInput').value = '';
    document.getElementById('rollInput').value = '';

    // Show on page
    displayItems();
}

// Delete item
function deleteItem(id) {
    items = items.filter(item => item.id != id);
    saveToStorage('myItems', items);
    displayItems();
}

// Show all items on page
function displayItems() {
    let html = '';
    items.forEach(item => {
        html += `
            <div class="item">
                Name: ${item.name} | Roll: ${item.roll}
                <button onclick="deleteItem(${item.id})">Delete</button>
            </div>
        `;
    });
    document.getElementById('list').innerHTML = html;
}

// Run when page loads
loadData();

</script>

</body>
</html>
