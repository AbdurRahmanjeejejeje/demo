<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-purple-900 to-violet-800">

  <!-- AUTH BOX -->
  <div id="authBox"
    class="w-96 bg-white/10 backdrop-blur-xl border border-white/20 text-white p-8 rounded-2xl shadow-2xl">

    <h2 id="title" class="text-3xl font-bold text-center mb-6 tracking-wide">
      Login
    </h2>

    <input id="username" placeholder="Username"
      class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 placeholder-gray-300 outline-none focus:ring-2 focus:ring-purple-400">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 placeholder-gray-300 outline-none focus:ring-2 focus:ring-purple-400">

    <button id="mainBtn"
      class="w-full p-3 rounded-lg bg-purple-500 hover:bg-purple-600 transition font-semibold shadow-lg">
      Login
    </button>

    <p class="text-sm text-center mt-5 text-gray-300">
      <span id="toggleText">Don't have an account?</span>
      <button onclick="toggleMode()" class="text-purple-300 font-semibold hover:underline">
        Signup
      </button>
    </p>

    <p id="msg" class="text-red-400 text-center mt-3 text-sm"></p>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard"
    class="hidden w-96 bg-white/10 backdrop-blur-xl border border-white/20 text-white p-8 rounded-2xl shadow-2xl text-center">

    <h2 class="text-3xl font-bold mb-4">Welcome</h2>

    <p class="text-gray-300 mb-6">
      Logged in as <span id="user" class="text-purple-300 font-semibold"></span>
    </p>

    <button onclick="logout()"
      class="w-full p-3 bg-red-500 hover:bg-red-600 rounded-lg transition font-semibold">
      Logout
    </button>

  </div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let mode = "login";

let authBox = document.getElementById("authBox");
let dashboard = document.getElementById("dashboard");

let title = document.getElementById("title");
let mainBtn = document.getElementById("mainBtn");
let msg = document.getElementById("msg");

// --------------------
// TOGGLE LOGIN / SIGNUP
// --------------------
function toggleMode() {

  msg.innerText = "";

  if (mode === "login") {
    mode = "signup";
    title.innerText = "Signup";
    mainBtn.innerText = "Create Account";
  } else {
    mode = "login";
    title.innerText = "Login";
    mainBtn.innerText = "Login";
  }
}

// --------------------
// MAIN ACTION
// --------------------
mainBtn.onclick = function () {

  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!username || !password) {
    msg.innerText = "Please fill all fields";
    return;
  }

  // SIGNUP
  if (mode === "signup") {

    let exists = users.find(u => u.username === username);

    if (exists) {
      msg.innerText = "Username already taken";
      return;
    }

    users.push({ username, password });
    localStorage.setItem("users", JSON.stringify(users));

    msg.style.color = "#4ade80";
    msg.innerText = "Account created! Now login";
  }

  // LOGIN
  else {

    let user = users.find(
      u => u.username === username && u.password === password
    );

    if (!user) {
      msg.innerText = "Invalid credentials";
      return;
    }

    localStorage.setItem("loggedInUser", username);
    showDashboard();
  }
};

// --------------------
// DASHBOARD
// --------------------
function showDashboard() {
  let user = localStorage.getItem("loggedInUser");

  authBox.classList.add("hidden");
  dashboard.classList.remove("hidden");

  document.getElementById("user").innerText = user;
}

// --------------------
// LOGOUT
// --------------------
function logout() {
  localStorage.removeItem("loggedInUser");
  location.reload();
}

// --------------------
// AUTO LOGIN
// --------------------
window.onload = function () {
  let user = localStorage.getItem("loggedInUser");

  if (user) {
    showDashboard();
  }
};

</script>

</body>
</html>
